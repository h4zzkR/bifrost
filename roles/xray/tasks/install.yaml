- name: Remove systemd drop-in overrides left by previous Xray installs
  ansible.builtin.file:
    path: /etc/systemd/system/xray.service.d
    state: absent

- name: Check currently installed Xray version
  ansible.builtin.slurp:
    src: "{{ (xray_path, 'version') | path_join }}"
  register: xray_version_current
  failed_when: false

- name: Get release, unpack, install, clean up
  vars:
    xray_filename: "Xray-{{ xray_platform }}.zip"
    xray_tmp_filename: "/tmp/{{ xray_filename }}"
  when: (xray_version_current.content is not defined) or (xray_version_current.content | b64decode | default('') | trim != xray_version)
  block:
    - name: Ensure unzip is installed
      ansible.builtin.package:
        name: unzip
        state: present

    - name: Download Xray binaries
      ansible.builtin.get_url:
        url: "https://github.com/XTLS/Xray-core/releases/download/{{ xray_version }}/{{ xray_filename }}"
        dest: "{{ xray_tmp_filename }}"
        mode: '0644'

    - name: Create Xray directory
      ansible.builtin.file:
        path: "{{ xray_path }}"
        state: directory
        mode: '0644'

    - name: Unzip Xray binaries
      ansible.builtin.unarchive:
        src: "{{ xray_tmp_filename }}"
        dest: "{{ xray_path }}"
        mode: '0644'
        remote_src: true

    - name: Make Xray binary executable
      ansible.builtin.file:
        path: "{{ (xray_path, 'xray') | path_join }}"
        mode: '0755'

    - name: Store Xray version
      ansible.builtin.copy:
        content: "{{ xray_version }}"
        dest: "{{ (xray_path, 'version') | path_join }}"
        mode: '0644'

    - name: Cleanup downloaded zip
      ansible.builtin.file:
        path: "{{ xray_tmp_filename }}"
        state: absent

- name: Download runetfreedom geosite.dat (Russia-focused rules)
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geosite.dat"
    dest: "{{ (xray_path, 'geosite.dat') | path_join }}"
    mode: '0644'
    force: true

- name: Download runetfreedom geoip.dat (Russia-focused rules)
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geoip.dat"
    dest: "{{ (xray_path, 'geoip.dat') | path_join }}"
    mode: '0644'
    force: true

- name: Deploy version-check script
  ansible.builtin.template:
    src: check_versions.sh.j2
    dest: /usr/local/bin/check-versions.sh
    mode: '0755'
    owner: root
    group: root

- name: Schedule daily version check (writes to stderr + syslog if updates found)
  ansible.builtin.cron:
    name: bifrost-version-check
    hour: "9"
    minute: "0"
    user: root
    job: "/usr/local/bin/check-versions.sh"

- name: Schedule weekly geo-database update for Xray
  ansible.builtin.cron:
    name: xray-geodat-update
    weekday: "2"
    hour: "4"
    minute: "0"
    user: root
    job: >-
      wget -q -O {{ xray_path }}/geosite.dat
      https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geosite.dat &&
      wget -q -O {{ xray_path }}/geoip.dat
      https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geoip.dat &&
      systemctl restart xray
