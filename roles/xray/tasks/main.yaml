---
- name: Install Xray
  ansible.builtin.include_tasks: install.yaml

- name: Update systemd service config
  ansible.builtin.template:
    src: xray.service.j2
    dest: /etc/systemd/system/xray.service
    owner: root
    group: root
    mode: '0644'

- name: Reload systemd to recognize the Xray service
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start Xray service
  ansible.builtin.systemd:
    name: xray
    enabled: true
    state: started

- name: Configure XRay
  ansible.builtin.include_tasks: configure.yaml

- name: Create XRay connection links file on server
  ansible.builtin.template:
    src: xray_client_connect_link.txt.j2
    dest: ~/xray_client_connect_link.txt
    owner: "{{ ansible_user_id | default(ansible_user) }}"
    group: "{{ ansible_user_id | default(ansible_user) }}"

- name: Read the XRay connection links file
  ansible.builtin.command: cat ~/xray_client_connect_link.txt
  register: xray_link_content
  changed_when: false

- name: Display connection links
  ansible.builtin.debug:
    msg: |
      ========== Xray client connection links ==========
      VLESS+XHTTP+Reality (port {{ xray_xhttp_port | default(8443) }}):
        {{ xray_link_content.stdout_lines[0] }}
      ==================================================

- name: Save connection links locally
  ansible.builtin.copy:
    content: "{{ xray_link_content.stdout }}"
    dest: "{{ playbook_dir }}/xray_client_connect_link.txt"
  delegate_to: localhost
  become: false
