---
# ============================================================
#  Bifrost validate — checks that all deployed VPN services
#  are operational on the remote server.
#
#  Usage (run with the NEW ssh port after hardening):
#    ansible-playbook playbook-validate.yaml \
#        --inventory ~/.ansible/hosts \
#        --ask-vault-pass \
#        -e "ansible_port=42228 ansible_user=vpnuser" \
#        -e "ansible_ssh_private_key_file=~/.ssh/id_vps"
#
#  To validate right after the initial deploy (still on root / port 22):
#    ansible-playbook playbook-validate.yaml \
#        --inventory ~/.ansible/hosts \
#        --ask-vault-pass
# ============================================================

- name: Validate VPN server
  hosts: vpn
  become: true
  gather_facts: false

  vars:
    enable_xray:      true
    enable_amneziawg: true
    xray_path:        "/opt/xray"
    xray_xhttp_port:  8443
    awg_port:         51820

  tasks:

    # ---- Xray checks ----------------------------------------
    - name: "[xray] Check service is active"
      ansible.builtin.systemd:
        name: xray
      register: xray_service_info
      when: enable_xray | bool

    - name: "[xray] Assert service is running"
      ansible.builtin.assert:
        that: xray_service_info.status.ActiveState == "active"
        fail_msg: "Xray service is NOT running (state: {{ xray_service_info.status.ActiveState }})"
        success_msg: "Xray service is running"
      when: enable_xray | bool

    - name: "[xray] Validate config syntax"
      ansible.builtin.command: "{{ xray_path }}/xray run -test -c {{ xray_path }}/config.json"
      register: xray_config_test
      changed_when: false
      when: enable_xray | bool

    - name: "[xray] Assert config is valid"
      ansible.builtin.assert:
        that: xray_config_test.rc == 0
        fail_msg: "Xray config is INVALID: {{ xray_config_test.stderr }}"
        success_msg: "Xray config is valid"
      when: enable_xray | bool

    - name: "[xray] Check port 443/tcp is listening"
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 443
        state: started
        timeout: 5
      when: enable_xray | bool

    - name: "[xray] Check XHTTP port {{ xray_xhttp_port }}/tcp is listening"
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ xray_xhttp_port }}"
        state: started
        timeout: 5
      when: enable_xray | bool

    - name: "[xray] Check connection links file exists"
      ansible.builtin.stat:
        path: ~/xray_client_connect_link.txt
      register: xray_links_stat
      when: enable_xray | bool

    - name: "[xray] Assert connection links file exists"
      ansible.builtin.assert:
        that: xray_links_stat.stat.exists
        fail_msg: "xray_client_connect_link.txt not found on server"
        success_msg: "Connection links file present"
      when: enable_xray | bool

    - name: "[xray] Show connection links"
      ansible.builtin.command: cat ~/xray_client_connect_link.txt
      register: xray_links_content
      changed_when: false
      when: enable_xray | bool

    - name: "[xray] Display links"
      ansible.builtin.debug:
        var: xray_links_content.stdout_lines
      when: enable_xray | bool

    # ---- AmneziaWG checks -----------------------------------
    - name: "[awg] Check service is active"
      ansible.builtin.systemd:
        name: awg-quick@awg0
      register: awg_service_info
      when: enable_amneziawg | bool

    - name: "[awg] Assert service is running"
      ansible.builtin.assert:
        that: awg_service_info.status.ActiveState == "active"
        fail_msg: "awg-quick@awg0 is NOT running (state: {{ awg_service_info.status.ActiveState }})"
        success_msg: "AmneziaWG service is running"
      when: enable_amneziawg | bool

    - name: "[awg] Check awg0 interface exists"
      ansible.builtin.command: ip link show awg0
      register: awg_iface
      changed_when: false
      when: enable_amneziawg | bool

    - name: "[awg] Assert awg0 interface is UP"
      ansible.builtin.assert:
        that: "'UP' in awg_iface.stdout or 'UNKNOWN' in awg_iface.stdout"
        fail_msg: "awg0 interface is not UP: {{ awg_iface.stdout }}"
        success_msg: "awg0 interface is UP"
      when: enable_amneziawg | bool

    - name: "[awg] Check UDP port {{ awg_port }} is listening"
      ansible.builtin.shell: "ss -ulnp | grep ':{{ awg_port }}'"
      register: awg_port_check
      changed_when: false
      failed_when: awg_port_check.rc != 0
      when: enable_amneziawg | bool

    - name: "[awg] Assert UDP port is open"
      ansible.builtin.assert:
        that: awg_port_check.rc == 0
        fail_msg: "AmneziaWG UDP port {{ awg_port }} is NOT open"
        success_msg: "AmneziaWG is listening on UDP {{ awg_port }}"
      when: enable_amneziawg | bool

    - name: "[awg] Check client config file exists"
      ansible.builtin.stat:
        path: ~/awg_client.conf
      register: awg_conf_stat
      when: enable_amneziawg | bool

    - name: "[awg] Assert client config exists"
      ansible.builtin.assert:
        that: awg_conf_stat.stat.exists
        fail_msg: "awg_client.conf not found on server"
        success_msg: "AmneziaWG client config present"
      when: enable_amneziawg | bool

    # ---- System checks --------------------------------------
    - name: "[sys] Check IPv4 forwarding is enabled"
      ansible.builtin.command: sysctl net.ipv4.ip_forward
      register: ip_forward_check
      changed_when: false
      when: enable_amneziawg | bool

    - name: "[sys] Assert IPv4 forwarding is on"
      ansible.builtin.assert:
        that: "'= 1' in ip_forward_check.stdout"
        fail_msg: "IPv4 forwarding is DISABLED"
        success_msg: "IPv4 forwarding is enabled"
      when: enable_amneziawg | bool

    - name: "[sys] Check BBR is active"
      ansible.builtin.command: sysctl net.ipv4.tcp_congestion_control
      register: bbr_check
      changed_when: false

    - name: "[sys] Show TCP congestion control"
      ansible.builtin.debug:
        msg: "TCP congestion control: {{ bbr_check.stdout }}"

    - name: "[sys] Check UFW status"
      ansible.builtin.command: ufw status verbose
      register: ufw_status
      changed_when: false

    - name: "[sys] Display UFW rules"
      ansible.builtin.debug:
        var: ufw_status.stdout_lines

    # ---- Summary --------------------------------------------
    - name: "All checks passed"
      ansible.builtin.debug:
        msg: >
          VPN server is fully operational.
          Protocols: {{ 'XRAY(443+' ~ xray_xhttp_port ~ ') ' if enable_xray else '' }}{{ 'AmneziaWG(UDP:' ~ awg_port ~ ')' if enable_amneziawg else '' }}
