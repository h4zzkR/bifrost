---
# ============================================================
#  Bifrost — Universal VPN server provisioning
#  Supported protocols: VLESS+Reality+XTLS-Vision, AmneziaWG
#  Target OS: Ubuntu 22.04 LTS
# ============================================================

- name: Deploy VPN protocols
  hosts: vpn
  become: true
  gather_facts: true

  vars:
    # ---- Protocol selection (set to false to skip) ----------
    enable_xray:       true
    enable_amneziawg:  true

    # ---- XRAY / VLESS+Reality+XTLS-Vision + XHTTP -----------
    xray_version:    "v26.2.6"
    xray_platform:   "linux-64"
    xray_path:       "/opt/xray"
    xray_xhttp_port: 8443   # port for VLESS+XHTTP+Reality

    # ---- AmneziaWG -----------------------------------------
    awg_port: 51820   # UDP port; change if your ISP blocks 51820

  roles:
    - role: xray
      when: enable_xray | bool

    - role: amneziawg
      when: enable_amneziawg | bool

- name: Harden VPN server
  hosts: vpn
  become: true
  gather_facts: false

  vars:
    # ---- Must match values above (used for firewall rules) --
    enable_xray:      true
    enable_amneziawg: true
    xray_xhttp_port:  8443
    awg_port:         51820

    # ---- SSH hardening -------------------------------------
    ssh_port:            42228          # new SSH port after hardening
    ssh_user:            "vpnuser"      # sudo user to create
    ssh_public_key_path: "~/.ssh/id_vps.pub"  # your local pub key
    ssh_disable_password_auth: false    # set false to keep password login (debug)
    ssh_disable_root_login:    true     # set false to keep root login (debug)

  roles:
    - security
