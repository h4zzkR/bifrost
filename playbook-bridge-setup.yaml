---
# ============================================================
#  Bifrost — Universal VPN server provisioning
#  Supported protocols: VLESS+XHTTP+Reality, AmneziaWG,
#                       Hysteria2 (QUIC/UDP — Catapult Hydra alternative)
#  Target OS: Ubuntu 22.04 LTS
# ============================================================

- name: Deploy VPN protocols
  hosts: vpn
  become: true
  gather_facts: true

  vars:
    # ---- Protocol selection (set to false to skip) ----------
    enable_xray:       true
    enable_amneziawg:  true
    enable_hysteria2:  true

    # ---- Self-steal: serve a real website on your own domain ----
    # Nginx serves port 443/TCP (TSPU sees a real site) and 127.0.0.1:4443 (Xray cert steal).
    # Requires DNS A record for webserver_domain → this VPS.
    # webserver_domain and certbot_email come from secrets.yml (ansible-vault).
    enable_webserver:     true
    webserver_nginx_port: 4443   # internal port used by Xray for cert steal

    # ---- XRAY / VLESS+XHTTP+Reality -------------------------
    xray_version:    "v26.2.6"
    xray_platform:   "linux-64"
    xray_path:       "/opt/xray"
    xray_xhttp_port: 8443
    # xray_sni_dest comes from secrets.yml (same value as webserver_domain)
    xray_reality_dest: "127.0.0.1:4443"   # self-steal: cert stolen from local nginx

    # ---- AmneziaWG -----------------------------------------
    awg_port: 51820

    # ---- Hysteria2 (QUIC/UDP — immune to TSPU TCP freeze) --
    hysteria2_version:  "v2.6.1"
    hysteria2_platform: "linux-amd64"
    hysteria2_path:     "/opt/hysteria2"
    hysteria2_port:     443   # UDP 443 — shares port with TCP 443 (no conflict)

  roles:
    # webserver must run before xray so nginx + cert are ready
    - role: webserver
      when: enable_webserver | bool

    - role: xray
      when: enable_xray | bool

    - role: amneziawg
      when: enable_amneziawg | bool

    - role: hysteria2
      when: enable_hysteria2 | bool

- name: Harden VPN server
  hosts: vpn
  become: true
  gather_facts: false

  vars:
    # ---- Must match values above (used for firewall rules) --
    enable_xray:       true
    enable_amneziawg:  true
    enable_hysteria2:  true
    xray_xhttp_port:   8443
    awg_port:          51820
    hysteria2_port:    443

    # ---- SSH hardening -------------------------------------
    ssh_port:            42228
    ssh_user:            "vpnuser"
    ssh_public_key_path: "~/.ssh/id_vps.pub"
    ssh_disable_password_auth: true
    ssh_disable_root_login:    true

  roles:
    - security
