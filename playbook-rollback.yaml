---
# ============================================================
#  Bifrost rollback — removes all VPN services and reverts
#  BOTH servers (foreign VPS + relay VPS) to a clean state.
#  Restores SSH to port 22 + password auth and reboots.
#
#  NOTE: After initial setup SSH was moved to a custom port
#  and password auth was disabled. Run rollback with:
#
#    ansible-playbook -i secrets.yaml playbook-rollback.yaml --ask-vault-pass \
#      -e "ansible_port=42228 ansible_user=vpnuser" \
#      -e "ansible_ssh_private_key_file=~/.ssh/id_vps"
#
#  Your SSH connection will DROP when sshd restarts — expected.
#  Reconnect after: ssh root@IP  (password auth restored, port 22)
# ============================================================

# ─────────────────────────────────────────────────────────────────────────────
#  Foreign VPS rollback
# ─────────────────────────────────────────────────────────────────────────────

- name: Roll back foreign VPS
  hosts: foreign
  become: true
  gather_facts: true

  vars:
    xray_path:      "/opt/xray"
    hysteria2_path: "/opt/hysteria2"

  tasks:

    # ── Xray ────────────────────────────────────────────────────────────────
    - name: "[foreign/xray] Stop and disable service"
      ansible.builtin.systemd:
        name: xray
        state: stopped
        enabled: false
      ignore_errors: true

    - name: "[foreign/xray] Remove systemd unit"
      ansible.builtin.file:
        path: /etc/systemd/system/xray.service
        state: absent

    - name: "[foreign/xray] Remove installation directory"
      ansible.builtin.file:
        path: "{{ xray_path }}"
        state: absent

    # ── Hysteria2 ────────────────────────────────────────────────────────────
    - name: "[foreign/hysteria2] Stop and disable service"
      ansible.builtin.systemd:
        name: hysteria2
        state: stopped
        enabled: false
      ignore_errors: true

    - name: "[foreign/hysteria2] Remove systemd unit"
      ansible.builtin.file:
        path: /etc/systemd/system/hysteria2.service
        state: absent

    - name: "[foreign/hysteria2] Remove installation directory"
      ansible.builtin.file:
        path: "{{ hysteria2_path }}"
        state: absent

    # ── AmneziaWG ────────────────────────────────────────────────────────────
    - name: "[foreign/awg] Stop and disable service"
      ansible.builtin.systemd:
        name: awg-quick@awg0
        state: stopped
        enabled: false
      ignore_errors: true

    - name: "[foreign/awg] Remove config directory"
      ansible.builtin.file:
        path: /etc/amnezia
        state: absent

    - name: "[foreign/awg] Purge packages"
      ansible.builtin.apt:
        name:
          - amneziawg
          - wireguard-tools
        state: absent
        purge: true
        autoremove: true

    - name: "[foreign/awg] Remove AmneziaWG PPA"
      ansible.builtin.apt_repository:
        repo: ppa:amnezia/ppa
        state: absent
        update_cache: true

    # ── Nginx / webserver ─────────────────────────────────────────────────────
    - name: "[foreign/nginx] Stop and disable nginx"
      ansible.builtin.systemd:
        name: nginx
        state: stopped
        enabled: false
      ignore_errors: true

    - name: "[foreign/nginx] Purge nginx and certbot"
      ansible.builtin.apt:
        name:
          - nginx
          - certbot
        state: absent
        purge: true
        autoremove: true

    - name: "[foreign/nginx] Remove webroot"
      ansible.builtin.file:
        path: /var/www/{{ foreign_domain | default('placeholder') }}
        state: absent
      ignore_errors: true

    # ── Home dir artifacts ────────────────────────────────────────────────────
    - name: "[foreign] Remove client link files"
      ansible.builtin.file:
        path: "~/{{ item }}"
        state: absent
      loop:
        - xray_client_connect_link.txt
        - hysteria2_client_connect_link.txt
        - awg_client.conf
      ignore_errors: true

    # ── Sysctl ────────────────────────────────────────────────────────────────
    - name: "[foreign/sysctl] Disable IPv4 forwarding"
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '0'
        sysctl_set: true
        state: present
        reload: true

    - name: "[foreign/sysctl] Revert congestion control to cubic"
      ansible.posix.sysctl:
        name: net.ipv4.tcp_congestion_control
        value: cubic
        sysctl_set: true
        state: present
        reload: true

    - name: "[foreign/sysctl] Revert default qdisc"
      ansible.posix.sysctl:
        name: net.core.default_qdisc
        value: pfifo_fast
        sysctl_set: true
        state: present
        reload: true

    # ── UFW ──────────────────────────────────────────────────────────────────
    - name: "[foreign/ufw] Reset UFW rules"
      ansible.builtin.command: ufw --force reset

    - name: "[foreign/ufw] Allow SSH on standard port 22"
      ansible.builtin.command: ufw allow 22/tcp

    - name: "[foreign/ufw] Enable UFW with default deny"
      ansible.builtin.command: ufw --force enable

    # ── SSH restore ───────────────────────────────────────────────────────────
    - name: "[foreign/ssh] Restore SSH to port 22"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?Port"
        line: "Port 22"
        validate: /usr/sbin/sshd -t -f %s

    - name: "[foreign/ssh] Re-enable password authentication"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication yes"
        validate: /usr/sbin/sshd -t -f %s

    - name: "[foreign/ssh] Re-enable root login"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin yes"
        validate: /usr/sbin/sshd -t -f %s

    - name: "[foreign/ssh] Find cloud-init sshd configs"
      ansible.builtin.find:
        paths: /etc/ssh/sshd_config.d/
        patterns: "*cloud-init.conf"
      register: foreign_cloud_ssh

    - name: "[foreign/ssh] Re-enable password auth in cloud-init configs"
      ansible.builtin.lineinfile:
        path: "{{ item.path }}"
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication yes"
        validate: /usr/sbin/sshd -t -f %s
      loop: "{{ foreign_cloud_ssh.files }}"

    - name: "[foreign/ssh] Restore root password"
      ansible.builtin.user:
        name: root
        password: "{{ hostvars[inventory_hostname].ansible_ssh_pass | password_hash('sha512') }}"
        update_password: always
      when: hostvars[inventory_hostname].ansible_ssh_pass | default('') != ''

    - name: "[foreign] systemd daemon-reload"
      ansible.builtin.systemd:
        daemon_reload: true

    - name: "[foreign] Rollback summary"
      ansible.builtin.debug:
        msg: >
          Foreign VPS rollback complete. SSH restoring to port 22.
          Reconnect: ssh root@{{ ansible_host }}

    - name: "[foreign/ssh] Restart sshd (connection will drop)"
      ansible.builtin.service:
        name: ssh
        state: restarted
      async: 1
      poll: 0
      ignore_errors: true

    - name: "[foreign] Reboot"
      ansible.builtin.command: shutdown -r now
      async: 5
      poll: 0
      ignore_errors: true

# ─────────────────────────────────────────────────────────────────────────────
#  Relay VPS rollback
# ─────────────────────────────────────────────────────────────────────────────

- name: Roll back relay VPS
  hosts: relay
  become: true
  gather_facts: true

  vars:
    xray_path:      "/opt/xray"
    hysteria2_path: "/opt/hysteria2"

  tasks:

    # ── Xray ─────────────────────────────────────────────────────────────────
    - name: "[relay/xray] Stop and disable service"
      ansible.builtin.systemd:
        name: xray
        state: stopped
        enabled: false
      ignore_errors: true

    - name: "[relay/xray] Remove systemd unit"
      ansible.builtin.file:
        path: /etc/systemd/system/xray.service
        state: absent

    - name: "[relay/xray] Remove installation directory"
      ansible.builtin.file:
        path: "{{ xray_path }}"
        state: absent

    # ── Hysteria2 client ──────────────────────────────────────────────────────
    - name: "[relay/hy2] Stop and disable hy2-relay service"
      ansible.builtin.systemd:
        name: hy2-relay
        state: stopped
        enabled: false
      ignore_errors: true

    - name: "[relay/hy2] Remove hy2-relay systemd unit"
      ansible.builtin.file:
        path: /etc/systemd/system/hy2-relay.service
        state: absent

    - name: "[relay/hy2] Remove Hysteria2 directory"
      ansible.builtin.file:
        path: "{{ hysteria2_path }}"
        state: absent

    # ── AmneziaWG client ──────────────────────────────────────────────────────
    - name: "[relay/awg] Stop and disable awg-quick@awg1"
      ansible.builtin.systemd:
        name: awg-quick@awg1
        state: stopped
        enabled: false
      ignore_errors: true

    - name: "[relay/awg] Remove AWG config directory"
      ansible.builtin.file:
        path: /etc/amnezia
        state: absent

    - name: "[relay/awg] Purge AmneziaWG packages"
      ansible.builtin.apt:
        name:
          - amneziawg
          - wireguard-tools
        state: absent
        purge: true
        autoremove: true

    - name: "[relay/awg] Remove AmneziaWG PPA"
      ansible.builtin.apt_repository:
        repo: ppa:amnezia/ppa
        state: absent
        update_cache: true

    # ── Nginx masquerade site ─────────────────────────────────────────────────
    - name: "[relay/nginx] Stop and disable nginx"
      ansible.builtin.systemd:
        name: nginx
        state: stopped
        enabled: false
      ignore_errors: true

    - name: "[relay/nginx] Purge nginx and certbot"
      ansible.builtin.apt:
        name:
          - nginx
          - certbot
        state: absent
        purge: true
        autoremove: true

    - name: "[relay/nginx] Remove certbot renewal cron"
      ansible.builtin.cron:
        name: certbot-renewal-relay
        state: absent
        user: root

    - name: "[relay/nginx] Remove webroot"
      ansible.builtin.file:
        path: /var/www/{{ relay_domain | default('placeholder') }}
        state: absent
      ignore_errors: true

    # ── Home dir artifacts ────────────────────────────────────────────────────
    - name: "[relay] Remove client link file"
      ansible.builtin.file:
        path: ~/relay_client_connect_link.txt
        state: absent
      ignore_errors: true

    # ── Sysctl ────────────────────────────────────────────────────────────────
    - name: "[relay/sysctl] Revert congestion control to cubic"
      ansible.posix.sysctl:
        name: net.ipv4.tcp_congestion_control
        value: cubic
        sysctl_set: true
        state: present
        reload: true

    - name: "[relay/sysctl] Revert default qdisc"
      ansible.posix.sysctl:
        name: net.core.default_qdisc
        value: pfifo_fast
        sysctl_set: true
        state: present
        reload: true

    # ── UFW ──────────────────────────────────────────────────────────────────
    - name: "[relay/ufw] Reset UFW rules"
      ansible.builtin.command: ufw --force reset

    - name: "[relay/ufw] Allow SSH on standard port 22"
      ansible.builtin.command: ufw allow 22/tcp

    - name: "[relay/ufw] Enable UFW with default deny"
      ansible.builtin.command: ufw --force enable

    # ── SSH restore ───────────────────────────────────────────────────────────
    - name: "[relay/ssh] Restore SSH to port 22"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?Port"
        line: "Port 22"
        validate: /usr/sbin/sshd -t -f %s

    - name: "[relay/ssh] Re-enable password authentication"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication yes"
        validate: /usr/sbin/sshd -t -f %s

    - name: "[relay/ssh] Re-enable root login"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin yes"
        validate: /usr/sbin/sshd -t -f %s

    - name: "[relay/ssh] Find cloud-init sshd configs"
      ansible.builtin.find:
        paths: /etc/ssh/sshd_config.d/
        patterns: "*cloud-init.conf"
      register: relay_cloud_ssh

    - name: "[relay/ssh] Re-enable password auth in cloud-init configs"
      ansible.builtin.lineinfile:
        path: "{{ item.path }}"
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication yes"
        validate: /usr/sbin/sshd -t -f %s
      loop: "{{ relay_cloud_ssh.files }}"

    - name: "[relay/ssh] Restore root password"
      ansible.builtin.user:
        name: root
        password: "{{ hostvars[inventory_hostname].ansible_ssh_pass | password_hash('sha512') }}"
        update_password: always
      when: hostvars[inventory_hostname].ansible_ssh_pass | default('') != ''

    - name: "[relay] systemd daemon-reload"
      ansible.builtin.systemd:
        daemon_reload: true

    - name: "[relay] Rollback summary"
      ansible.builtin.debug:
        msg: >
          Relay VPS rollback complete. SSH restoring to port 22.
          Reconnect: ssh root@{{ ansible_host }}

    - name: "[relay/ssh] Restart sshd (connection will drop)"
      ansible.builtin.service:
        name: ssh
        state: restarted
      async: 1
      poll: 0
      ignore_errors: true

    - name: "[relay] Reboot"
      ansible.builtin.command: shutdown -r now
      async: 5
      poll: 0
      ignore_errors: true
