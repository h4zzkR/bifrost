[defaults]
host_key_checking = False
# Use project-local control sockets so they never conflict across projects
# or across port/user changes on the same host.

[ssh_connection]
control_path_dir = /tmp/.ansible_cp_bifrost
control_path      = %(directory)s/%%h-%%p-%%r
pipelining        = True
ssh_args          = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
